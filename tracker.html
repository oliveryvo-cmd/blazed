<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Box Tracker — B.L.A.Z.E.D</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Courier+Prime:wght@400;700&family=Nunito:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--dark:#07090f;--orange:#ff6b00;--yellow:#ffd000;--blue:#0099ff;--white:#f8faff;--silver:#a0aec0;}
body{background:var(--dark);color:var(--white);font-family:'Nunito',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;}

h1{font-family:'Oswald',sans-serif;font-size:clamp(20px,4vw,32px);letter-spacing:4px;color:var(--orange);margin-bottom:4px;}
.sub{font-family:'Courier Prime',monospace;font-size:11px;letter-spacing:3px;color:#444;margin-bottom:48px;}

.counter-wrap{margin-bottom:48px;}
.counter-num{font-family:'Oswald',sans-serif;font-size:clamp(100px,25vw,180px);font-weight:900;letter-spacing:-4px;line-height:1;color:var(--orange);text-shadow:0 0 80px rgba(255,107,0,0.4);display:block;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{text-shadow:0 0 80px rgba(255,107,0,0.4);}50%{text-shadow:0 0 120px rgba(255,107,0,0.8);}}
.counter-label{font-family:'Oswald',sans-serif;font-size:clamp(16px,3vw,28px);letter-spacing:6px;color:#333;margin-top:8px;}

.stats{display:flex;gap:40px;justify-content:center;flex-wrap:wrap;margin-bottom:48px;}
.stat{text-align:center;}
.stat-num{font-family:'Oswald',sans-serif;font-size:36px;font-weight:700;display:block;}
.stat-num.yellow{color:var(--yellow);}
.stat-num.blue{color:var(--blue);}
.stat-label{font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:2px;color:#333;margin-top:4px;}

.admin-section{background:#0d1220;border:1px solid #1a2030;border-radius:16px;padding:24px 32px;max-width:400px;width:100%;margin-bottom:32px;}
.admin-label{font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:3px;color:#333;margin-bottom:12px;}
.admin-input{display:flex;gap:8px;}
.admin-input input{flex:1;background:#07090f;border:1px solid #1a2030;border-radius:6px;padding:10px 14px;font-family:'Oswald',sans-serif;font-size:18px;color:var(--white);outline:none;text-align:center;width:80px;}
.admin-input input:focus{border-color:var(--orange);}
.admin-btn{background:linear-gradient(135deg,var(--orange),var(--yellow));color:#000;border:none;padding:10px 20px;font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:2px;font-weight:700;border-radius:6px;cursor:pointer;}
.admin-note{font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:1px;color:#333;margin-top:10px;}

.back{font-family:'Courier Prime',monospace;font-size:11px;letter-spacing:3px;color:#333;text-decoration:none;margin-top:8px;}
.back:hover{color:var(--orange);}

.confetti-piece{position:fixed;border-radius:2px;animation:fall linear forwards;pointer-events:none;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>

<h1>BOX TRACKER</h1>
<p class="sub">// EVERY BOX DELIVERED · EVERY KID WHO FELT JOY</p>

<div class="counter-wrap">
  <span class="counter-num" id="counter">0</span>
  <div class="counter-label">BOXES DELIVERED</div>
</div>

<div class="stats">
  <div class="stat">
    <span class="stat-num yellow" id="localStat">0</span>
    <div class="stat-label">LADERA RANCH</div>
  </div>
  <div class="stat">
    <span class="stat-num blue" id="shipStat">0</span>
    <div class="stat-label">SHIPPED NATIONWIDE</div>
  </div>
</div>

<div class="admin-section">
  <div class="admin-label">// OLIVER — UPDATE THE COUNT</div>
  <div class="admin-input">
    <input type="number" id="newCount" min="0" placeholder="0">
    <button class="admin-btn" onclick="updateCount()">UPDATE</button>
  </div>
  <div class="admin-note">Only Oliver can update this number.</div>
  <br>
  <div class="admin-label" style="margin-top:8px;">// LOCAL vs SHIPPED</div>
  <div class="admin-input" style="margin-top:8px;">
    <input type="number" id="localCount" min="0" placeholder="Local">
    <input type="number" id="shipCount" min="0" placeholder="Shipped">
    <button class="admin-btn" onclick="updateStats()">SET</button>
  </div>
</div>

<a href="index.html" class="back">← BACK TO B.L.A.Z.E.D</a>

<script>
function load() {
  const c = localStorage.getItem('blazed_boxes') || '0';
  const l = localStorage.getItem('blazed_local') || '0';
  const s = localStorage.getItem('blazed_ship') || '0';
  animateTo(parseInt(c));
  document.getElementById('localStat').textContent = l;
  document.getElementById('shipStat').textContent = s;
  document.getElementById('newCount').value = c;
  document.getElementById('localCount').value = l;
  document.getElementById('shipCount').value = s;
}

function animateTo(target) {
  const el = document.getElementById('counter');
  const current = parseInt(el.textContent) || 0;
  if (current === target) return;
  const step = target > current ? 1 : -1;
  const diff = Math.abs(target - current);
  const delay = diff > 20 ? 20 : 80;
  let val = current;
  const iv = setInterval(() => {
    val += step;
    el.textContent = val;
    if (val === target) {
      clearInterval(iv);
      if (target > current) spawnConfetti();
    }
  }, delay);
}

function updateCount() {
  const val = parseInt(document.getElementById('newCount').value) || 0;
  localStorage.setItem('blazed_boxes', val);
  animateTo(val);
}

function updateStats() {
  const l = parseInt(document.getElementById('localCount').value) || 0;
  const s = parseInt(document.getElementById('shipCount').value) || 0;
  localStorage.setItem('blazed_local', l);
  localStorage.setItem('blazed_ship', s);
  document.getElementById('localStat').textContent = l;
  document.getElementById('shipStat').textContent = s;
}

function spawnConfetti() {
  const colors = ['#ff6b00','#ffd000','#0099ff','#ff4d6d','#00e676'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    const size = Math.random() * 10 + 4;
    c.style.cssText = `left:${Math.random()*100}vw;top:0;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${Math.random()*2+1.5}s;animation-delay:${Math.random()*0.5}s;`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3000);
  }
}

load();
</script>
</body>
</html>
