<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>UNBOX IT — B.L.A.Z.E.D</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Nunito:wght@400;700;900&family=Courier+Prime&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--dark:#07090f;--orange:#ff6b00;--yellow:#ffd000;--blue:#0099ff;--coral:#ff4d6d;--green:#00e676;--white:#f8faff;--silver:#a0aec0;}
body{background:var(--dark);color:var(--white);font-family:'Nunito',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;padding:20px;}

.confetti-piece{position:fixed;border-radius:2px;animation:fall linear forwards;pointer-events:none;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}

h1{font-family:'Oswald',sans-serif;font-size:clamp(28px,6vw,56px);letter-spacing:5px;text-align:center;margin-bottom:6px;}
h1 span{color:var(--orange);}
.sub{font-family:'Courier Prime',monospace;font-size:11px;letter-spacing:4px;color:#555;text-align:center;margin-bottom:40px;}

/* BOX */
.game-area{display:flex;flex-direction:column;align-items:center;gap:24px;width:100%;max-width:500px;}
.box-wrap{position:relative;width:220px;height:220px;cursor:pointer;user-select:none;}
.box-body{position:absolute;bottom:0;left:0;right:0;height:180px;background:linear-gradient(135deg,#1a0a00,#2a1200);border:3px solid var(--orange);border-radius:12px;transition:all .3s;display:flex;align-items:center;justify-content:center;font-size:72px;}
.box-lid{position:absolute;top:0;left:-6px;right:-6px;height:70px;background:linear-gradient(135deg,#2a1500,#ff6b00);border:3px solid var(--yellow);border-radius:12px;transition:all .4s cubic-bezier(.34,1.56,.64,1);transform-origin:left center;display:flex;align-items:center;justify-content:center;}
.box-ribbon-v{position:absolute;left:50%;top:0;bottom:0;width:4px;background:var(--yellow);transform:translateX(-50%);}
.box-ribbon-h{position:absolute;top:50%;left:0;right:0;height:4px;background:var(--yellow);transform:translateY(-50%);}
.bow{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:28px;}

.box-wrap.opening .box-lid{transform:rotate(-75deg) translateY(-40px);}
.box-wrap.opened .box-lid{transform:rotate(-110deg) translateY(-60px) translateX(-20px);opacity:0;}

.shake{animation:shake .5s ease-in-out;}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px) rotate(-2deg);}40%{transform:translateX(8px) rotate(2deg);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}}

/* PRIZE */
.prize-reveal{display:none;flex-direction:column;align-items:center;gap:12px;text-align:center;animation:popIn .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{0%{transform:scale(0);opacity:0;}100%{transform:scale(1);opacity:1;}}
.prize-icon{font-size:80px;filter:drop-shadow(0 0 30px rgba(255,208,0,0.8));}
.prize-name{font-family:'Oswald',sans-serif;font-size:28px;letter-spacing:3px;color:var(--yellow);}
.prize-desc{font-size:14px;color:var(--silver);max-width:320px;line-height:1.7;}
.prize-rarity{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:3px;padding:4px 16px;border-radius:100px;display:inline-block;margin-top:4px;}
.rarity-common{background:rgba(160,174,192,0.15);border:1px solid var(--silver);color:var(--silver);}
.rarity-rare{background:rgba(0,153,255,0.15);border:1px solid var(--blue);color:var(--blue);}
.rarity-epic{background:rgba(108,63,197,0.15);border:1px solid #8b5cf6;color:#8b5cf6;}
.rarity-legendary{background:rgba(255,208,0,0.15);border:1px solid var(--yellow);color:var(--yellow);}

/* PROGRESS */
.progress-wrap{width:100%;max-width:400px;}
.progress-label{display:flex;justify-content:space-between;font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:2px;color:#444;margin-bottom:6px;}
.progress-bar{background:#0d1220;border-radius:100px;height:10px;overflow:hidden;}
.progress-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--orange),var(--yellow));transition:width .6s ease;}

.unboxes{font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:2px;color:#333;text-align:center;}

/* BUTTONS */
.btn{background:linear-gradient(135deg,var(--orange),var(--yellow));color:#000;border:none;padding:16px 40px;font-family:'Oswald',sans-serif;font-size:18px;letter-spacing:3px;font-weight:700;border-radius:8px;cursor:pointer;transition:all .2s;margin-top:8px;}
.btn:hover{transform:translateY(-2px);}
.btn-ghost{background:transparent;color:#333;border:1px solid #1a2030;padding:12px 32px;font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:2px;border-radius:8px;cursor:pointer;transition:all .2s;margin-top:4px;}
.btn-ghost:hover{border-color:var(--orange);color:var(--orange);}

.tap-hint{font-family:'Courier Prime',monospace;font-size:12px;letter-spacing:3px;color:#333;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.4;}50%{opacity:1;}}

.collection{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:400px;margin-top:8px;}
.coll-item{font-size:24px;background:rgba(255,255,255,0.04);border:1px solid #1a2030;border-radius:8px;padding:8px;title:attr(data-name);}

.back-link{font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:3px;color:#333;text-decoration:none;margin-top:16px;}
.back-link:hover{color:var(--orange);}
</style>
</head>
<body>

<h1>UNBOX <span>IT.</span></h1>
<p class="sub">// TAP THE BOX TO SEE WHAT'S INSIDE</p>

<div class="game-area">

  <div class="box-wrap" id="boxWrap" onclick="tapBox()">
    <div class="box-body" id="boxBody">
      <div class="box-ribbon-v"></div>
      <div class="box-ribbon-h"></div>
    </div>
    <div class="box-lid" id="boxLid">
      <div class="bow">🎀</div>
    </div>
  </div>

  <p class="tap-hint" id="tapHint">TAP THE BOX TO OPEN IT</p>

  <div class="prize-reveal" id="prizeReveal">
    <div class="prize-icon" id="prizeIcon"></div>
    <div class="prize-name" id="prizeName"></div>
    <div class="prize-desc" id="prizeDesc"></div>
    <div class="prize-rarity" id="prizeRarity"></div>
    <button class="btn" onclick="nextBox()">📦 OPEN ANOTHER BOX</button>
    <button class="btn-ghost" onclick="window.location.href='order.html'">🔥 ORDER A REAL BOX</button>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span>COLLECTION</span>
      <span id="collCount">0 / 20</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="collection" id="collection"></div>
  <div class="unboxes" id="unboxCount"></div>

</div>

<a href="index.html" class="back-link">← BACK TO B.L.A.Z.E.D</a>

<script>
const PRIZES = [
  // COMMON
  { icon:'🟢', name:'Nee Doh', desc:'The satisfying squishy ball you can squish all day.', rarity:'COMMON', rc:'rarity-common' },
  { icon:'🟩', name:'Green Slime', desc:'Super stretchy, super satisfying slime.', rarity:'COMMON', rc:'rarity-common' },
  { icon:'🏷️', name:'B.L.A.Z.E.D Sticker Pack', desc:'Official B.L.A.Z.E.D stickers to put everywhere.', rarity:'COMMON', rc:'rarity-common' },
  { icon:'🪀', name:'Yo-Yo', desc:'Classic. Timeless. Endlessly fun.', rarity:'COMMON', rc:'rarity-common' },
  { icon:'🎨', name:'Mini Paint Set', desc:'Tiny paint set, big creativity.', rarity:'COMMON', rc:'rarity-common' },
  { icon:'🧸', name:'Mystery Plush', desc:'A soft mystery plush — you never know which one!', rarity:'COMMON', rc:'rarity-common' },
  { icon:'🃏', name:'Card Game', desc:'A fun mini card game to play with friends.', rarity:'COMMON', rc:'rarity-common' },
  { icon:'🪄', name:'Magic Trick Set', desc:'Impress everyone with these easy magic tricks.', rarity:'COMMON', rc:'rarity-common' },
  // RARE
  { icon:'🎴', name:'Mini Brands', desc:'Mystery unboxing figures — which one did you get?', rarity:'RARE', rc:'rarity-rare' },
  { icon:'⚡', name:'Fidget Cube', desc:'All the buttons, switches, and dials you need.', rarity:'RARE', rc:'rarity-rare' },
  { icon:'🧩', name:'3D Puzzle', desc:'A satisfying 3D puzzle that actually challenges you.', rarity:'RARE', rc:'rarity-rare' },
  { icon:'🎮', name:'Mini Arcade Game', desc:'A tiny handheld arcade game you can carry anywhere.', rarity:'RARE', rc:'rarity-rare' },
  { icon:'🌈', name:'Rainbow Sensory Kit', desc:'Textures, colors, and calm — all in one kit.', rarity:'RARE', rc:'rarity-rare' },
  { icon:'🎯', name:'Magnetic Dart Board', desc:'Safe magnetic darts, endless fun.', rarity:'RARE', rc:'rarity-rare' },
  // EPIC
  { icon:'🦄', name:'Labubu Figure', desc:'A rare Labubu mystery figure from Oliver\'s collection.', rarity:'EPIC', rc:'rarity-epic' },
  { icon:'🌀', name:'Galaxy Slime Kit', desc:'3 colors of galaxy slime you can mix yourself.', rarity:'EPIC', rc:'rarity-epic' },
  { icon:'🎁', name:'Mystery Box Bundle', desc:'A bundle of 3 surprise items packed by Oliver himself.', rarity:'EPIC', rc:'rarity-epic' },
  { icon:'🤖', name:'Build-It Robot Kit', desc:'Build your own mini robot. No tools needed.', rarity:'EPIC', rc:'rarity-epic' },
  // LEGENDARY
  { icon:'👑', name:'Oliver\'s Handwritten Letter', desc:'A real letter written by Oliver himself — just for you. This is the rarest item in the box.', rarity:'LEGENDARY', rc:'rarity-legendary' },
  { icon:'🔥', name:'Full Legend Box', desc:'YOU GOT THE LEGEND BOX! Oliver packs you the full 8-10 toy ultimate box. CLAIM IT REAL — screenshot this!', rarity:'LEGENDARY', rc:'rarity-legendary' },
];

// Weighted random: common=50%, rare=30%, epic=15%, legendary=5%
const WEIGHTS = { COMMON: 50, RARE: 30, EPIC: 15, LEGENDARY: 5 };

let taps = 0;
let opening = false;
let collected = new Set();
let totalUnboxes = 0;

function weightedPrize() {
  const roll = Math.random() * 100;
  let pool;
  if (roll < 5) pool = PRIZES.filter(p => p.rarity === 'LEGENDARY');
  else if (roll < 20) pool = PRIZES.filter(p => p.rarity === 'EPIC');
  else if (roll < 50) pool = PRIZES.filter(p => p.rarity === 'RARE');
  else pool = PRIZES.filter(p => p.rarity === 'COMMON');
  return pool[Math.floor(Math.random() * pool.length)];
}

function tapBox() {
  if (opening) return;
  const wrap = document.getElementById('boxWrap');

  taps++;
  wrap.classList.add('shake');
  setTimeout(() => wrap.classList.remove('shake'), 500);

  if (taps >= 3) {
    openBox();
  } else {
    document.getElementById('tapHint').textContent = taps === 1 ? 'KEEP TAPPING...' : 'ONE MORE TIME...';
  }
}

function openBox() {
  if (opening) return;
  opening = true;
  const wrap = document.getElementById('boxWrap');
  wrap.classList.add('opening');
  document.getElementById('tapHint').style.display = 'none';

  setTimeout(() => {
    wrap.classList.add('opened');
    const prize = weightedPrize();
    showPrize(prize);
  }, 400);
}

function showPrize(prize) {
  totalUnboxes++;
  collected.add(prize.icon + prize.name);

  document.getElementById('prizeIcon').textContent = prize.icon;
  document.getElementById('prizeName').textContent = prize.name;
  document.getElementById('prizeDesc').textContent = prize.desc;
  const rar = document.getElementById('prizeRarity');
  rar.textContent = prize.rarity;
  rar.className = 'prize-rarity ' + prize.rc;

  document.getElementById('prizeReveal').style.display = 'flex';
  document.getElementById('progressWrap').style.display = 'block';

  // Collection
  updateCollection();

  // Confetti for rare+
  if (prize.rarity !== 'COMMON') spawnConfetti(prize.rarity === 'LEGENDARY' ? 120 : prize.rarity === 'EPIC' ? 60 : 30);

  document.getElementById('unboxCount').textContent = totalUnboxes + ' box' + (totalUnboxes !== 1 ? 'es' : '') + ' opened';
}

function updateCollection() {
  const coll = document.getElementById('collection');
  coll.innerHTML = '';
  collected.forEach(key => {
    const prize = PRIZES.find(p => p.icon + p.name === key);
    if (!prize) return;
    const el = document.createElement('div');
    el.className = 'coll-item';
    el.textContent = prize.icon;
    el.title = prize.name;
    coll.appendChild(el);
  });
  const pct = Math.min((collected.size / 20) * 100, 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('collCount').textContent = collected.size + ' / 20';
}

function nextBox() {
  opening = false;
  taps = 0;
  const wrap = document.getElementById('boxWrap');
  wrap.classList.remove('opening', 'opened', 'shake');
  document.getElementById('prizeReveal').style.display = 'none';
  document.getElementById('tapHint').style.display = 'block';
  document.getElementById('tapHint').textContent = 'TAP THE BOX TO OPEN IT';
}

function spawnConfetti(count) {
  const colors = ['#ff6b00','#ffd000','#0099ff','#ff4d6d','#00e676','#fff'];
  for (let i = 0; i < count; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    const size = Math.random() * 10 + 4;
    c.style.cssText = `
      left:${Math.random()*100}vw;
      top:0;
      width:${size}px;
      height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>0.5?'50%':'2px'};
      animation-duration:${Math.random()*2+1.5}s;
      animation-delay:${Math.random()*0.5}s;
    `;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3000);
  }
}
</script>
</body>
</html>
